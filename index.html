<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1726">
<title>FROG HOLLOWER</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;touch-action:none;}
  html,body{height:100%;width:100%;background:#15121f;overflow:hidden;overscroll-behavior:none;position:fixed;inset:0;
    font-family:-apple-system,"Helvetica Neue",sans-serif;-webkit-user-select:none;user-select:none;}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  .gb{ width:400px; transform-origin:center center; position:relative;
    background:linear-gradient(160deg,#8b6fc4,#5e4a8a); border-radius:18px 18px 42px 18px; padding:18px 18px 24px;
    box-shadow:inset 0 2px 0 rgba(255,255,255,.25),inset 0 -6px 14px rgba(0,0,0,.35),0 14px 40px rgba(0,0,0,.55); }
  .brand{display:flex;justify-content:space-between;align-items:baseline;padding:0 4px 8px;}
  .brand b{color:#2a2140;font-size:13px;letter-spacing:1px;font-weight:800;}
  .brand span{color:#cdbdf0;font-size:9px;letter-spacing:2px;}
  .screenframe{background:#2a2140;border-radius:10px 10px 26px 10px;padding:14px 20px 16px;box-shadow:inset 0 4px 10px rgba(0,0,0,.6);}
  .pwr{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
  .pwr i{width:7px;height:7px;border-radius:50%;background:#ff5b5b;box-shadow:0 0 6px #ff5b5b;display:inline-block;}
  .pwr small{color:#9c8fc7;font-size:8px;letter-spacing:1px;}
  canvas{width:100%;height:auto;display:block;image-rendering:pixelated;image-rendering:crisp-edges;background:#0f1320;border-radius:3px;}
  .pad{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding:0 6px;}
  .dpad{position:relative;width:108px;height:108px;}
  .dbtn{position:absolute;background:#241b38;border:none;box-shadow:inset 0 2px 0 rgba(255,255,255,.08),0 3px 0 #160f24;}
  .dbtn:active{transform:translateY(2px);box-shadow:inset 0 2px 0 rgba(255,255,255,.08);}
  .up{left:38px;top:0;width:32px;height:40px;border-radius:7px 7px 0 0;}
  .down{left:38px;bottom:0;width:32px;height:40px;border-radius:0 0 7px 7px;}
  .left{left:0;top:38px;width:40px;height:32px;border-radius:7px 0 0 7px;}
  .right{right:0;top:38px;width:40px;height:32px;border-radius:0 7px 7px 0;}
  .dcenter{left:38px;top:38px;width:32px;height:32px;background:#241b38;position:absolute;}
  .ab{display:flex;gap:16px;align-items:center;transform:rotate(-18deg);}
  .rbtn{width:56px;height:56px;border-radius:50%;border:none;color:#fff;font-weight:800;font-size:16px;
    background:radial-gradient(circle at 35% 30%,#c8504f,#8a2f2e);box-shadow:inset 0 2px 0 rgba(255,255,255,.3),0 4px 0 #5a1d1c;}
  .rbtn:active{transform:translateY(3px);box-shadow:inset 0 2px 0 rgba(255,255,255,.3);}
  .rbtn small{display:block;font-size:7px;opacity:.85;font-weight:600;}
  .hint{text-align:center;color:#b7a8de;font-size:9px;margin-top:12px;line-height:1.6;}
  .mute{position:absolute;top:14px;right:16px;background:rgba(0,0,0,.2);border:none;color:#cdbdf0;font-size:10px;padding:4px 8px;border-radius:6px;}
</style>
</head>
<body>
<div id="stage">
<div class="gb" id="gb">
  <button class="mute" id="mute">&#9834; ON</button>
  <div class="brand"><b>FROG&nbsp;HOLLOWER</b><span>COLOR</span></div>
  <div class="screenframe">
    <div class="pwr"><i></i><small>BATTERY</small></div>
    <canvas id="g" width="200" height="180"></canvas>
  </div>
  <div class="pad">
    <div class="dpad">
      <button class="dbtn up" data-k="up"></button>
      <button class="dbtn down" data-k="down"></button>
      <button class="dbtn left" data-k="left"></button>
      <button class="dbtn right" data-k="right"></button>
      <div class="dcenter"></div>
    </div>
    <div class="ab">
      <button class="rbtn" data-k="burrow">B<small>もぐる</small></button>
      <button class="rbtn" data-k="attack">A<small>した</small></button>
    </div>
  </div>
  <div class="hint">移動:十字キー &nbsp;A=舌こうげき &nbsp;B=地中もぐり回避<br>タコを全部たおすと出口がひらく</div>
</div>
</div>

const SP={frog:{up:[0,1],down:[2,3],left:[4,5],right:[6,7]},tako:{up:[8,9],down:[10,11],left:[12,13],right:[14,15]}};
function drawCell(idx,cx,by){const col=idx%4,row=(idx/4)|0;ctx.drawImage(atlas,col*CW,row*CH,CW,CH,Math.round(cx-CW/2),Math.round(by-CH),CW,CH);}
const C={bg:'#10131f',floor:'#27314a',floor2:'#222a40',grout:'#1a2034',wall:'#3a3358',wallTop:'#4a4570',wallEdge:'#171326',
  tongue:'#d05f9a',tongueT:'#f29ec8',door:'#caa64a',doorOpen:'#7fce5e',hpFull:'#e0566a',hpEmpty:'#3a3358',white:'#e8eef2',shadow:'rgba(0,0,0,.30)',fc:'#7fce5e'};
const MAP=["1111111111","1000000001","1011000101","1000000001","1000110002","1000110002","1010000101","1000000001","1111111111"];
const door={tx:9,ty:4,open:false};
function tileAt(tx,ty){if(ty<0||ty>=9||tx<0||tx>=10)return '1';return MAP[ty][tx];}
function solidAt(x,y){const t=tileAt((x/T)|0,(y/T)|0);if(t==='1')return true;if(t==='2'&&!door.open)return true;return false;}
const player={x:40,y:90,w:11,h:8,dir:'down',spd:1.05,hp:3,maxhp:3,attack:0,atkCd:0,burrow:0,burrowCd:0,inv:0,anim:0,moving:false};
let enemies=[],particles=[],shake=0,msg='',msgT=0,state='play';
function spawnEnemies(){enemies=[{x:150,y:46},{x:150,y:134},{x:100,y:128},{x:78,y:50}].map(e=>({...e,w:12,h:10,vx:0,vy:0,hit:0,dead:false,dir:'down',anim:Math.random()*60}));}
function burst(x,y,c){for(let i=0;i<9;i++){const a=Math.random()*6.28,s=.5+Math.random()*1.6;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:18+Math.random()*8,c});}}
const keys={};
const km={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',s:'down',a:'left',d:'right',W:'up',S:'down',A:'left',D:'right',z:'attack',Z:'attack',j:'attack',J:'attack',' ':'attack',x:'burrow',X:'burrow',k:'burrow',K:'burrow'};
addEventListener('keydown',e=>{if(km[e.key]){keys[km[e.key]]=true;e.preventDefault();initAudio();}});
addEventListener('keyup',e=>{if(km[e.key])keys[km[e.key]]=false;});
document.querySelectorAll('[data-k]').forEach(b=>{const k=b.dataset.k;const on=e=>{e.preventDefault();keys[k]=true;initAudio();};const off=e=>{e.preventDefault();keys[k]=false;};
  b.addEventListener('pointerdown',on);b.addEventListener('pointerup',off);b.addEventListener('pointerleave',off);b.addEventListener('pointercancel',off);});
let actx=null,muted=false;
function initAudio(){if(!actx){try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}}
function blip(f,d,t='square',v=.06){if(!actx||muted)return;const o=actx.createOscillator(),g=actx.createGain();o.type=t;o.frequency.value=f;o.connect(g);g.connect(actx.destination);g.gain.setValueAtTime(v,actx.currentTime);g.gain.exponentialRampToValueAtTime(1e-4,actx.currentTime+d);o.start();o.stop(actx.currentTime+d);}
document.getElementById('mute').onclick=()=>{muted=!muted;document.getElementById('mute').innerHTML=muted?'&#9834; OFF':'&#9834; ON';};
function move(o,nx,ny){if(!solidAt(nx-o.w/2,o.y-o.h/2)&&!solidAt(nx+o.w/2,o.y-o.h/2)&&!solidAt(nx-o.w/2,o.y+o.h/2)&&!solidAt(nx+o.w/2,o.y+o.h/2))o.x=nx;if(!solidAt(o.x-o.w/2,ny-o.h/2)&&!solidAt(o.x+o.w/2,ny-o.h/2)&&!solidAt(o.x-o.w/2,ny+o.h/2)&&!solidAt(o.x+o.w/2,ny+o.h/2))o.y=ny;}
const VEC={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
function update(){ if(state!=='play'){updateFX();return;} const p=player;let mx=0,my=0;
  if(keys.left)mx--;if(keys.right)mx++;if(keys.up)my--;if(keys.down)my++; p.moving=!!(mx||my);
  if(mx&&!my)p.dir=mx<0?'left':'right';else if(my&&!mx)p.dir=my<0?'up':'down';else if(mx&&my){if(Math.abs(mx)>=Math.abs(my))p.dir=mx<0?'left':'right';else p.dir=my<0?'up':'down';}
  if(p.burrowCd>0)p.burrowCd--;
  if(keys.burrow&&p.burrow<=0&&p.burrowCd<=0){p.burrow=44;p.burrowCd=72;p.inv=44;blip(110,.18,'sine',.08);}
  const bur=p.burrow>0;if(bur)p.burrow--; const spd=bur?p.spd*1.7:p.spd;
  if(p.moving){const l=Math.hypot(mx,my);move(p,p.x+mx/l*spd,p.y+my/l*spd);p.anim+=0.18;}
  if(p.atkCd>0)p.atkCd--;
  if(keys.attack&&p.attack<=0&&p.atkCd<=0&&!bur){p.attack=13;p.atkCd=19;blip(680,.07,'square',.05);}
  if(p.attack>0)p.attack--; if(p.inv>0)p.inv--;
  if(p.attack>6){const reach=22,[vx,vy]=VEC[p.dir],hx=p.x+vx*reach,hy=p.y+vy*reach;
    enemies.forEach(e=>{if(e.dead)return;if(Math.abs(e.x-hx)<11&&Math.abs(e.y-hy)<11&&e.hit<=0){e.hit=10;e.vx=vx*2.6;e.vy=vy*2.6;e.dead=true;burst(e.x,e.y,C.tongueT);shake=4;blip(180,.18,'sawtooth',.06);}});}
  enemies.forEach(e=>{if(e.dead)return;if(e.hit>0)e.hit--;e.anim++;const dx=p.x-e.x,dy=p.y-e.y,d=Math.hypot(dx,dy)||1;
    e.vx=e.vx*0.82+dx/d*0.14;e.vy=e.vy*0.82+dy/d*0.14;
    if(Math.abs(dx)>Math.abs(dy))e.dir=dx<0?'left':'right';else e.dir=dy<0?'up':'down'; move(e,e.x+e.vx,e.y+e.vy);
    if(!bur&&p.inv<=0&&Math.abs(e.x-p.x)<11&&Math.abs(e.y-p.y)<10){p.hp--;p.inv=72;shake=6;blip(90,.25,'sawtooth',.08);const a=Math.atan2(p.y-e.y,p.x-e.x);p.x+=Math.cos(a)*7;p.y+=Math.sin(a)*7;if(p.hp<=0){state='dead';msg='GAME OVER';msgT=9e9;}}});
  if(enemies.every(e=>e.dead)&&!door.open){door.open=true;msg='でぐち が ひらいた!';msgT=170;blip(520,.1);setTimeout(()=>blip(700,.14),120);}
  if(door.open){const dx=door.tx*T+10,dy=door.ty*T+10;if(Math.abs(p.x-dx)<12&&Math.abs(p.y-dy)<16){state='clear';msg='STAGE CLEAR!';msgT=9e9;blip(523,.1);setTimeout(()=>blip(659,.1),110);setTimeout(()=>blip(784,.18),220);}}
  updateFX();}
function updateFX(){if(shake>0)shake-=.7;particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=.9;p.vy*=.9;p.life--;});particles=particles.filter(p=>p.life>0);if(msgT>0&&msgT<9e9)msgT--;}
function drawTiles(){for(let ty=0;ty<9;ty++)for(let tx=0;tx<10;tx++){const t=MAP[ty][tx],X=tx*T,Y=ty*T;
  if(t==='1'){ctx.fillStyle=C.wall;ctx.fillRect(X,Y,T,T);ctx.fillStyle=C.wallTop;ctx.fillRect(X,Y,T,5);ctx.fillStyle=C.wallEdge;ctx.fillRect(X,Y+T-3,T,3);}
  else{ctx.fillStyle=(tx+ty)%2?C.floor:C.floor2;ctx.fillRect(X,Y,T,T);ctx.fillStyle=C.grout;ctx.fillRect(X,Y,T,1);ctx.fillRect(X,Y,1,T);}}
  const dX=door.tx*T,dY=door.ty*T;
  if(door.open){ctx.fillStyle=C.bg;ctx.fillRect(dX+3,dY,T-3,T*2);ctx.fillStyle=C.doorOpen;ctx.fillRect(dX,dY,3,T*2);}
  else{ctx.fillStyle=C.door;ctx.fillRect(dX,dY,T,T*2);ctx.fillStyle='#8a6f2c';ctx.fillRect(dX+3,dY+3,T-6,T*2-6);ctx.fillStyle=C.door;ctx.fillRect(dX+T/2-1,dY+7,2,T*2-14);}}
function drawFrog(){const p=player;if(p.inv>0&&((p.inv/4)|0)%2===0&&state==='play')return;
  if(p.burrow>0){ctx.fillStyle=C.floor;ctx.beginPath();ctx.ellipse(p.x,p.y+2,6,4,0,0,7);ctx.fill();ctx.fillStyle=C.wallTop;ctx.beginPath();ctx.ellipse(p.x,p.y,4,3,0,0,7);ctx.fill();return;}
  ctx.fillStyle=C.shadow;ctx.beginPath();ctx.ellipse(p.x,p.y+6,8,3,0,0,7);ctx.fill();
  const fr=(p.moving?(((p.anim)|0)%2):0); drawCell(SP.frog[p.dir][fr],p.x,p.y+9);
  if(p.attack>6){const[vx,vy]=VEC[p.dir],r=(13-p.attack)*4;ctx.strokeStyle=C.tongue;ctx.lineWidth=3;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(p.x+vx*4,p.y+vy*4-3);ctx.lineTo(p.x+vx*r,p.y+vy*r-3);ctx.stroke();
    ctx.fillStyle=C.tongueT;ctx.beginPath();ctx.arc(p.x+vx*r,p.y+vy*r-3,3,0,7);ctx.fill();}}
function drawTako(e){if(e.dead)return;ctx.fillStyle=C.shadow;ctx.beginPath();ctx.ellipse(e.x,e.y+7,8,3,0,0,7);ctx.fill();
  const fr=(((e.anim/14)|0)%2);if(e.hit>0&&((e.hit/2)|0)%2===0){ctx.save();ctx.globalCompositeOperation='lighter';}
  drawCell(SP.tako[e.dir][fr],e.x,e.y+10);if(e.hit>0&&((e.hit/2)|0)%2===0)ctx.restore();}
function drawHUD(){for(let i=0;i<player.maxhp;i++){const hx=5+i*13,hy=5,on=i<player.hp,c=on?C.hpFull:C.hpEmpty;
  ctx.fillStyle=c;ctx.fillRect(hx+1,hy,3,1);ctx.fillRect(hx+6,hy,3,1);ctx.fillRect(hx,hy+1,10,3);ctx.fillRect(hx+1,hy+4,8,1);ctx.fillRect(hx+2,hy+5,6,1);ctx.fillRect(hx+3,hy+6,4,1);ctx.fillRect(hx+4,hy+7,2,1);}
  const ready=player.burrowCd<=0;ctx.fillStyle=C.wallEdge;ctx.fillRect(W-18,6,12,5);ctx.fillStyle=ready?C.fc:C.tongue;ctx.fillRect(W-17,7,Math.round(10*(1-player.burrowCd/72)),3);}
function text(s,cx,cy,c,sc=1){ctx.save();ctx.font='bold '+(8*sc)+'px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=C.bg;ctx.fillText(s,cx+1,cy+1);ctx.fillStyle=c;ctx.fillText(s,cx,cy);ctx.restore();}
function render(){ctx.save();const sx=(Math.random()-.5)*shake,sy=(Math.random()-.5)*shake;ctx.translate(sx,sy);
  ctx.fillStyle=C.bg;ctx.fillRect(-4,-4,W+8,H+8);drawTiles();
  const d=[{y:player.y,f:drawFrog},...enemies.filter(e=>!e.dead).map(e=>({y:e.y,f:()=>drawTako(e)}))];
  d.sort((a,b)=>a.y-b.y).forEach(o=>o.f());
  particles.forEach(p=>{ctx.fillStyle=p.c;ctx.fillRect(p.x-1,p.y-1,2,2);});drawHUD();ctx.restore();
  if(msgT>0||state==='dead'||state==='clear'){ctx.fillStyle='rgba(16,19,31,.84)';ctx.fillRect(0,H/2-16,W,30);ctx.fillStyle=C.fc;ctx.fillRect(0,H/2-16,W,1);ctx.fillRect(0,H/2+13,W,1);
    text(msg,W/2,H/2-2,state==='dead'?C.hpFull:C.fc,1.4);if(state==='dead'||state==='clear')text('A:もういちど',W/2,H/2+20,C.white,1);}
  if(!ready){ctx.fillStyle=C.bg;ctx.fillRect(0,0,W,H);text('LOADING...',W/2,H/2,C.white,1.2);}}
function reset(){player.x=40;player.y=90;player.hp=3;player.attack=0;player.atkCd=0;player.burrow=0;player.burrowCd=0;player.inv=0;player.dir='down';door.open=false;particles=[];spawnEnemies();state='play';msg='てきを たおせ!';msgT=120;}
let rl=false;
function loop(){if((state==='dead'||state==='clear')){if(keys.attack&&!rl){rl=true;reset();}if(!keys.attack)rl=false;}update();render();requestAnimationFrame(loop);}
spawnEnemies();msg='てきを たおせ!';msgT=120;fit();loop();
</script>
</body>
